<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Contatore Caffè</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <h1>☕ Contatore Caffè</h1>
    <p>Scegli i caffè e mostra il totale al/alla barista!</p>
  </header>

  <main class="grid" id="grid"></main>

  <section class="summary" id="summary">
    <button id="close-summary" class="btn btn-ghost btn-square close-btn" aria-label="Chiudi ordine">✕</button>
    <h2>Ordine complessivo</h2>
    <div class="total-line" id="total-line">Totale: 0</div>
    <ul id="summary-list"></ul>
    <button id="pay-btn" class="btn btn-primary pay-btn">🎲 Chi paga?</button>
    <div class="summary-actions">
      <button id="copy-btn" class="btn btn-secondary">Copia ordine</button>
      <button id="reset-btn" class="btn btn-danger">Azzera tutto</button>
    </div>
    <p id="copy-feedback" class="feedback" aria-live="polite"></p>
  </section>

  <button id="fab" class="btn btn-primary btn-pill fab" aria-label="Mostra ordine">
    <span class="fab-icon">☕</span>
    <span id="fab-count" class="fab-count">0</span>
  </button>

  <div id="pay-modal" class="pay-modal hidden" role="dialog" aria-modal="true" aria-labelledby="pay-title">
    <div class="pay-card">
      <button id="close-pay" class="btn btn-ghost btn-square close-btn" aria-label="Chiudi estrazione">✕</button>
      <h2 id="pay-title">Chi paga?</h2>
      <div id="pay-cup" class="pay-cup"></div>
      <div id="pay-drink" class="pay-drink" aria-live="polite">…</div>
      <p id="pay-tiebreak" class="pay-tiebreak"></p>
      <button id="pay-again" class="btn btn-secondary">Ripeti estrazione</button>
    </div>
  </div>

  <div id="cache-modal" class="pay-modal hidden" role="dialog" aria-modal="true" aria-labelledby="cache-title">
    <div class="pay-card cache-card">
      <h2 id="cache-title">Ordine precedente trovato</h2>
      <p class="cache-text">Hai un ordine precedente salvato. Vuoi continuare da dove eri rimasto o iniziare un nuovo ordine?</p>
      <div class="cache-actions">
        <button id="cache-keep" class="btn btn-secondary">Continua ordine</button>
        <button id="cache-wipe" class="btn btn-danger">Nuovo ordine</button>
      </div>
    </div>
  </div>
  <!--
  <div id="onboarding" class="onboarding" role="status" aria-live="polite">
    <span class="onboarding-text">Stai cercando il recap dei caffè? È stato spostato qua!</span>
    <span class="onboarding-arrow" aria-hidden="true"></span>
  </div>-->

  <script src="app.js"></script>
</body>
</html>
