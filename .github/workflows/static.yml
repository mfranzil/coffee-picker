# Deploy static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["master"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build deployment directory
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p _site

          # Copy the site while excluding repository-only and source files.
          rsync -a \
            --exclude="_site/" \
            --exclude=".git/" \
            --exclude=".github/" \
            --exclude="LICENSE" \
            --exclude="LICENCE" \
            --exclude="README.md" \
            --exclude="screenshot.png" \
            --exclude="app.js" \
            --exclude="style.css" \
            ./ _site/

          # Minify JavaScript while keeping the original filename.
          npx --yes terser@5 app.js \
            --compress \
            --mangle \
            --comments false \
            --output _site/app.js

          # Minify CSS while keeping the original filename.
          npx --yes clean-css-cli@5 \
            --output _site/style.css \
            style.css

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5